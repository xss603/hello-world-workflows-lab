# Invokes the `greet` template from the `greeter` WorkflowTemplate via
# templateRef, instead of duplicating the template body inline.
apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  generateName: hello-workflow-template-
  labels:
    lab.example.com/concept: workflow-template-consumer
spec:
  entrypoint: main
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    fsGroup: 1000
  templates:
    - name: main
      steps:
        - - name: greet
            templateRef:
              name: greeter
              template: greet
            arguments:
              parameters:
                - name: name
                  value: "hello-world-workflows-lab"
